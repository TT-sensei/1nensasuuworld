<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仲間ガチャ - 算数ワールド</title>
    <style>
        /* ガチャのテーマカラー（星空と金色） */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #2c3e50; margin: 0; padding: 10px; color: #fff; }
        h1 { color: #f1c40f; font-size: 1.8rem; margin-bottom: 5px; text-shadow: 2px 2px 0px #d35400; }
        .subtitle { color: #f39c12; font-size: 1rem; font-weight: bold; margin-bottom: 20px; }

        /* 現在のカミナリ（エネルギー）表示 */
        .energy-box { background: rgba(255, 255, 255, 0.1); border: 2px solid #f1c40f; padding: 10px 20px; border-radius: 20px; display: inline-block; font-size: 1.5rem; font-weight: bold; margin-bottom: 30px; box-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        .energy-icon { color: #f39c12; }

        /* ガチャマシン（宝箱） */
        .gacha-machine { font-size: 5rem; margin-bottom: 20px; filter: drop-shadow(0 0 10px #f1c40f); cursor: pointer; transition: transform 0.2s; }
        .gacha-machine:active { transform: scale(0.9); }

        /* ガチャを引くボタン */
        .btn-gacha { font-size: 1.4rem; font-weight: bold; padding: 15px 30px; border: none; border-radius: 15px; cursor: pointer; background: linear-gradient(to bottom, #f1c40f, #f39c12); color: #fff; text-shadow: 1px 1px 0px #d35400; box-shadow: 0 6px 0 #d35400; transition: transform 0.1s, box-shadow 0.1s; }
        .btn-gacha:active { transform: translateY(6px); box-shadow: 0 0 0 #d35400; }
        .btn-gacha:disabled { background: #7f8c8d; box-shadow: 0 6px 0 #2c3e50; cursor: not-allowed; text-shadow: none; }

        /* ガチャ結果エリア */
        #result-area { display: none; margin-top: 30px; background: rgba(0, 0, 0, 0.5); padding: 20px; border-radius: 15px; border: 2px dashed #f1c40f; }
        .result-title { font-size: 1.2rem; margin-bottom: 10px; color: #f1c40f; }
        #result-emoji { font-size: 5rem; margin: 10px 0; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        #result-name { font-size: 1.5rem; font-weight: bold; color: #fff; }
        #result-rarity { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }

        /* レア度ごとの色 */
        .rarity-N { color: #bdc3c7; } /* ノーマル：銀色 */
        .rarity-R { color: #3498db; } /* レア：青色 */
        .rarity-SR { color: #e74c3c; text-shadow: 0 0 10px red; } /* Sレア：赤・発光 */
        .rarity-UR { color: #f1c40f; text-shadow: 0 0 15px gold; } /* ウルトラレア：金・発光 */

        /* 戻るボタン */
        .btn-back { display: inline-block; padding: 12px 20px; background: #95a5a6; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 0 #7f8c8d; margin-top: 30px; }
        .btn-back:active { transform: translateY(4px); box-shadow: 0 0 0 #7f8c8d; }

        /* ガチャを引いている時の揺れるアニメーション */
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
            100% { transform: rotate(0deg); }
        }
        .shaking { animation: shake 0.3s infinite; }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>✨ なかま ガチャ ✨</h1>
    <div class="subtitle">カミナリ(⚡)を つかって なかまを あつめよう！</div>

    <div class="energy-box">
        <span class="energy-icon">⚡</span> <span id="current-energy">0</span>
    </div>

    <div>
        <div class="gacha-machine" id="gacha-box">🎁</div>
        <br>
        <button class="btn-gacha" id="btn-gacha" onclick="playGacha()">1回 ガチャをまわす（⚡ 30）</button>
    </div>

    <div id="result-area">
        <div class="result-title">＼ なかまが ふえた！ ／</div>
        <div id="result-emoji">❓</div>
        <div id="result-name">なまえ</div>
        <div id="result-rarity">レア度</div>
    </div>

    <br>
    <a href="index.html" class="btn-back">⬅️ マップにもどる</a>

    <script src="system.js"></script>

    <script>
        // ガチャの中身（キャラクター図鑑）
        const GACHA_POOL = [
            // ノーマル (N) - 確率高め
            { emoji: "🐶", name: "こいぬ", rarity: "N", weight: 30 },
            { emoji: "🐱", name: "こねこ", rarity: "N", weight: 30 },
            { emoji: "🐭", name: "ねずみ", rarity: "N", weight: 30 },
            { emoji: "🐹", name: "ハムスター", rarity: "N", weight: 30 },
            { emoji: "🐰", name: "うさぎ", rarity: "N", weight: 30 },
            
            // レア (R) - 少し珍しい
            { emoji: "🦊", name: "キツネ", rarity: "R", weight: 15 },
            { emoji: "🐻", name: "クマ", rarity: "R", weight: 15 },
            { emoji: "🐼", name: "パンダ", rarity: "R", weight: 15 },
            { emoji: "🐨", name: "コアラ", rarity: "R", weight: 15 },
            
            // スーパーレア (SR) - 結構珍しい
            { emoji: "🦁", name: "ライオン", rarity: "SR", weight: 5 },
            { emoji: "🐯", name: "トラ", rarity: "SR", weight: 5 },
            { emoji: "🦄", name: "ユニコーン", rarity: "SR", weight: 5 },
            
            // ウルトラレア (UR) - 大当たり！
            { emoji: "🐉", name: "ドラゴン", rarity: "UR", weight: 1 },
            { emoji: "👽", name: "うちゅうじん", rarity: "UR", weight: 1 }
        ];

        // 1回ガチャを回すのに必要なカミナリ
        const GACHA_COST = 30;

        // 画面を開いたときにカミナリの量を表示
        function updateUI() {
            let data = loadData();
            document.getElementById('current-energy').textContent = data.energy;

            // カミナリが足りない場合はボタンを押せなくする
            let btn = document.getElementById('btn-gacha');
            if (data.energy < GACHA_COST) {
                btn.disabled = true;
                btn.textContent = "⚡ カミナリが たりないよ！";
            } else {
                btn.disabled = false;
                btn.textContent = `1回 ガチャをまわす（⚡ ${GACHA_COST}）`;
            }
        }

        function playGacha() {
            let data = loadData();
            
            if (data.energy < GACHA_COST) return;

            // ボタンを押せなくして、結果エリアを一旦隠す
            document.getElementById('btn-gacha').disabled = true;
            document.getElementById('result-area').style.display = 'none';

            // カミナリを減らす
            data.energy -= GACHA_COST;
            
            // 宝箱を揺らすアニメーション開始
            let box = document.getElementById('gacha-box');
            box.className = "gacha-machine shaking";

            // ガチャの抽選
            let result = drawCharacter();

            // なかまリスト（配列）が無ければ作る
            if (!data.companions) {
                data.companions = [];
            }
            // 当たった仲間を保存データに追加
            data.companions.push(result.emoji);
            
            // データを保存（system.jsのsaveData関数を使用）
            saveData(data);

            // 1秒後に結果を表示
            setTimeout(() => {
                box.className = "gacha-machine"; // 揺れを止める
                
                // 結果を画面にセット
                document.getElementById('result-emoji').textContent = result.emoji;
                document.getElementById('result-name').textContent = result.name;
                
                let rarityDisplay = document.getElementById('result-rarity');
                rarityDisplay.textContent = "レア度：" + result.rarity;
                rarityDisplay.className = "rarity-" + result.rarity;

                // 結果エリアを表示
                document.getElementById('result-area').style.display = 'block';

                // カミナリの表示を更新
                updateUI();
            }, 1000);
        }

        // 確率（weight）を元にキャラクターを抽選する関数
        function drawCharacter() {
            let totalWeight = 0;
            for (let i = 0; i < GACHA_POOL.length; i++) {
                totalWeight += GACHA_POOL[i].weight;
            }

            let randomNum = Math.floor(Math.random() * totalWeight);
            
            let currentWeight = 0;
            for (let i = 0; i < GACHA_POOL.length; i++) {
                currentWeight += GACHA_POOL[i].weight;
                if (randomNum < currentWeight) {
                    return GACHA_POOL[i];
                }
            }
            return GACHA_POOL[0]; // 万が一のための保険
        }

        // ページを読み込んだらUIを更新
        window.onload = updateUI;
    </script>
</body>
</html>
