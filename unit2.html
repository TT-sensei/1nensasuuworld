<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10の神殿 - 算数ワールド</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #fffde7; margin: 0; padding: 10px; color: #333; }
        h1 { color: #f57f17; font-size: 1.6rem; margin-bottom: 5px; text-shadow: 1px 1px 0px #fff; }
        .subtitle { color: #fbc02d; font-size: 1rem; font-weight: bold; margin-bottom: 20px; }
        .question-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 6px 0 #ffe082; margin-bottom: 25px; border: 4px solid #ffca28; }
        .question-text { font-size: 1.4rem; font-weight: bold; color: #e65100; margin-bottom: 15px; }
        .blocks-container { font-size: 2rem; letter-spacing: 2px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; background: #fff8e1; padding: 10px; border-radius: 10px; border: 2px dashed #ffb300; }
        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 0 auto 30px; }
        .btn-choice { font-size: 1.8rem; font-weight: bold; padding: 15px; border: none; border-radius: 12px; cursor: pointer; background: #fff; color: #333; box-shadow: 0 5px 0 #ffd54f; border: 2px solid #ffecb3; transition: transform 0.1s, box-shadow 0.1s; }
        .btn-choice:active { transform: translateY(5px); box-shadow: 0 0 0 #ffd54f; }
        .btn-back { display: inline-block; padding: 12px 20px; background: #757575; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 0 #424242; margin-top: 10px; }
        .btn-back:active { transform: translateY(4px); box-shadow: 0 0 0 #424242; }
        #feedback { font-size: 1.5rem; font-weight: bold; height: 30px; margin-bottom: 10px; }
        .correct { color: #4caf50; animation: pop 0.3s ease-out; }
        .wrong { color: #f44336; animation: shake 0.3s ease-in-out; }
        @keyframes pop { 0% { transform: scale(0.8); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <h1>🏛️ 10の神殿</h1>
    <div class="subtitle">あわせて「10」を つくりだせ！</div>

    <div id="feedback"></div>

    <div class="question-box">
        <div class="question-text" id="q-text">もんだい を つくっています...</div>
        <div class="blocks-container" id="q-content"></div>
    </div>

    <div class="choices-grid" id="choices-area"></div>

    <a href="index.html" class="btn-back">⬅️ マップにもどる</a>

    <script src="system.js"></script>

    <script>
        let currentAnswer = 0;
        let isAnswering = false;

        function generateQuestion() {
            isAnswering = false;
            document.getElementById('feedback').textContent = "";
            document.getElementById('feedback').className = "";

            let num = Math.floor(Math.random() * 9) + 1; 
            currentAnswer = 10 - num;

            document.getElementById('q-text').textContent = `「 ${num} 」と あといくつで 10 になる？`;
            document.getElementById('q-content').textContent = "🟡".repeat(num) + "⚪".repeat(currentAnswer);

            generateChoices(currentAnswer);
        }

        function generateChoices(correct) {
            let choices = new Set([correct]);
            while (choices.size < 4) {
                choices.add(Math.floor(Math.random() * 9) + 1);
            }
            let choiceArray = Array.from(choices).sort(() => Math.random() - 0.5);

            const choicesArea = document.getElementById('choices-area');
            choicesArea.innerHTML = ""; 
            choiceArray.forEach(num => {
                let btn = document.createElement('button');
                btn.className = 'btn-choice';
                btn.textContent = num;
                btn.onclick = () => checkAnswer(num);
                choicesArea.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            if (isAnswering) return;
            const feedback = document.getElementById('feedback');

            if (selected === currentAnswer) {
                isAnswering = true;
                feedback.textContent = "⭕ だいせいかい！ (+10 EXP, +5 ⚡)";
                feedback.className = "correct";
                
                let result = addRewards(10, 5); 
                
                if (result.leveledUp) {
                    setTimeout(() => alert(`🎉 レベルアップ！ Lv.${result.newLevel}になったよ！`), 100);
                }

                // サクサク進むように0.8秒で次の問題へ
                setTimeout(generateQuestion, 800);
            } else {
                feedback.textContent = "❌ おしい！たまの かずを かぞえてみて！";
                feedback.className = "wrong";
            }
        }

        window.onload = generateQuestion;
    </script>
</body>
</html>
